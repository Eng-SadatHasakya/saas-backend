name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Create test .env
        run: |
          echo "DATABASE_URL=postgresql://postgres:testpassword@localhost:5432/testdb" >> .env
          echo "SECRET_KEY=test_secret_key_for_ci" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=60" >> .env
          echo "GROQ_API_KEY=test_key" >> .env
          echo "STRIPE_SECRET_KEY=test_key" >> .env
          echo "STRIPE_PUBLISHABLE_KEY=test_key" >> .env
          echo "STRIPE_WEBHOOK_SECRET=test_key" >> .env
          echo "STRIPE_PRO_PRICE_ID=test_key" >> .env
          echo "STRIPE_ENTERPRISE_PRICE_ID=test_key" >> .env

      - name: Create tables
        run: python -c "from app.core.database import engine, Base; from app import models; Base.metadata.create_all(bind=engine)"

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__ --ignore=E302,E305,W292,W291,F401,E712,E225,E261,E265,F811,F821
        continue-on-error: true
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t saas-backend .

      - name: Verify Docker image
        run: docker images saas-backend